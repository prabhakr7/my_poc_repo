buttons: 
- # ====== Button: CREATE ======================================
  id: 15664267861054302701
  identification: 
    button-name: CREATE
    label: Add Reference Type

  layout: 
    sequence: 20
    region: Reference Types # 15664268208231302704
    slot: RIGHT_OF_IR_SEARCH_BAR
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    button-template: Text
    hot: true
    template-options: 
    - '#DEFAULT#'

  behavior: 
    action: Redirect to Page in this Application
    target: 
      url: 'f?p=&APP_ID.:79:&SESSION.::&DEBUG.:79::'
      page: 79 # Reference Type Details
      clear-cache: 79

    warn-on-unsaved-changes: Do Not Check

  server-side-condition: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      APEX_UTIL.GET_BUILD_OPTION_STATUS(
          P_APPLICATION_ID => :APP_ID,
          P_BUILD_OPTION_NAME => 'Customer Referencability') = 'INCLUDE'
      or
      APEX_UTIL.GET_BUILD_OPTION_STATUS(
          P_APPLICATION_ID => :APP_ID,
          P_BUILD_OPTION_NAME => 'Product Referencability') = 'INCLUDE'

  security: 
    authorization-scheme: ADMINISTRATION RIGHTS # 15698200031781635234

