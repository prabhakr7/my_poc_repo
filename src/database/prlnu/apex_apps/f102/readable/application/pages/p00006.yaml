validations: 
- # ====== Validation: P6_TYPE unique ==========================
  id: 15085308024544307489
  identification: 
    name: P6_TYPE unique

  execution: 
    sequence: 10

  validation: 
    type: No Rows returned
    sql-query: |
      select null
      from eba_cust_type
      where upper(type) = upper(:P6_TYPE)
          and (:P6_ID is null or id <> :P6_ID )
    always-execute: false

  error: 
    error-message: '#LABEL# already exists.'
    display-location: Inline with Field and in Notification
    associated-item: P6_TYPE # 17822838913333704082

  server-side-condition: 
    type: Request is contained in Value
    value: CREATE,SAVE

- # ====== Validation: Check Dependencies ======================
  id: 17850843512349579920
  identification: 
    name: Check Dependencies

  execution: 
    sequence: 20

  validation: 
    type: No Rows returned
    sql-query: 'Select 1 from eba_cust_customers where type_id = :P6_ID and rownum = 1'
    always-execute: false

  error: 
    error-message: Cannot Delete this Type, Customers exists with this Type.
    display-location: Inline with Field and in Notification
    associated-item: P6_TYPE # 17822838913333704082

  server-side-condition: 
    when-button-pressed: DELETE # 17822837826635704047

