css: 
  inline: |
    body ul.largeLinkList li a { padding-right: 48px; }
    
    .acl-Info {
      display: block;
      overflow: hidden;
    }
    .acl-Info-statusBox,
    .acl-Info-usersBox {
      display: block;
      float: left;
      width: 50%;
    }
    .acl-Info-statusBox {
      text-align: center;
    }
    .acl-Info-heading {
      display: block;
      font-size: 16px;
      margin: 16px 16px 8px 16px;
      font-weight: bold;
      color: #404040;
    }
    .acl-Info-heading span {
      color: #707070;
      font-weight: normal;
    }
    .acl-Info-status {
      display: block;
      width: 50%;
      margin: 0 auto 8px auto;
      padding: 12px 0;
      border: 1px solid #D0D0D0;
      border-radius: 2px;
      font-size: 20px;
      line-height: 20px;
      color: #404040;
      font-weight: bold;
      background-color: #F0F0F0;
    }
    .authScheme .acl-Info-status {
      font-size: 16px;
      width: 70%
    }
    .acl-Info-status.is-enabled {
      background-color: #40C230;
      border-color: #37A62A;
      color: #FFF;
      text-shadow: 0 -1px 0 rgba(0,0,0,.25);
    }
    .acl-Info-status.is-disabled {
      background-color: #DE3038;
      border-color: #A0242A;
      color: #FFF;
      text-shadow: 0 -1px 0 rgba(0,0,0,.25);
    }
    .acl-Info-changeStatusLink {
      display: inline-block;
      padding: 8px 0;
      color: #404040;
      text-decoration: none;
      font-size: 11px;
      background-color: #F0F0F0;
      border: 1px solid #D0D0D0;
      margin: 0 16px 16px 16px;
      border-radius: 2px;
      width: 50%;
    }
    .acl-Info-changeStatusLink:hover {
      background-color: #fff;
      border-color: #C0C0C0;
      box-shadow: 0 1px 1px rgba(0,0,0,.15);
    }
    .acl-Info-changeStatusLink:active {
      background-color: #E0E0E0;
      border-color: #C0C0C0;
      box-shadow: 0 1px 1px rgba(0,0,0,.25) inset;
    }
    .acl-Info-users {
      margin: 0;
      list-style: none;
      padding: 0;
      margin: 0;
      border-left: 1px solid #F0F0F0;
    }
    .acl-Info-user {
      border-top: 1px solid #F0F0F0;
    }
    .acl-Info-userLink {
      text-decoration: none;
      display: block;
      padding: 8px;
    }
    .acl-Info-userLink:hover {
      background-color: #689AD8;
    }
    .acl-Info-user:first-child {
      border-top: none;
    }
    .acl-Info-userType,
    .acl-Info-userCount {
      display: block;
      font-size: 14px;
    }
    .acl-Info-userType {
      font-weight: bold;
      float: left;
      margin-right: 8px;
      line-height: 32px;
    }
    .acl-Info-userLink:hover .acl-Info-userType {
      color: #FFF;
    }
    .acl-Info-userCount {
      display: block;
      overflow: hidden;
      text-align: right;
    }
    .acl-Info-userCount span {
      display: inline-block;
      padding: 8px;
      background-color: #F8F8F8;
      color: #404040;
      line-height: 16px;
      min-width: 36px;
      text-decoration: none;
      text-align: right;
      border-radius: 2px;
    }
    .acl-Info-desc {
