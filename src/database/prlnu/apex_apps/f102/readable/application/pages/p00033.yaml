- # ====== Region: Customers ===================================
  id: 17815314653386001409
  identification: 
    name: Customers
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select 
      A."ID",
      "CUSTOMER_NAME",
      "STATUS",
      "CATEGORY",
      "REFERENCABLE",
      "NUMBER_OF_USERS",
      "SUMMARY",
      "WEB_SITE",
      A."CREATED",
      A."CREATED_BY",
      A."UPDATED",
      A."UPDATED_BY",
      tags
       from   "EBA_CUST_CUSTOMERS" A , "EBA_CUST_CATEGORIES" B, "EBA_CUST_STATUS" C 
      where A.CATEGORY_ID = B.ID (+) 
        and A.STATUS_ID = C.ID (+)

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
