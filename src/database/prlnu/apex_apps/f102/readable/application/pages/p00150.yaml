dynamic-actions: 
- # ====== Dynamic Action: Set Show Flags ======================
  id: 18191430653060657701
  identification: 
    name: Set Show Flags

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P150_ACTIVITY_ID

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 18191430743154657702
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        for c1 in ( select nvl2(a.activity_date,'N','Y') show_activity_date,
                        nvl2(a.owner,'N','Y') show_owner,
                        nvl2(a.location,'N','Y') show_location
                    from eba_cust_activities a
                    where a.id = :P150_ACTIVITY_ID ) loop
            :P150_SHOW_DATE := c1.show_activity_date;
            :P150_SHOW_OWNER := c1.show_owner;
            :P150_SHOW_LOCATION := c1.show_location;
        end loop;
      items-to-submit: 
      - P150_ACTIVITY_ID
      items-to-return: 
      - P150_SHOW_DATE
      - P150_SHOW_OWNER
      - P150_SHOW_LOCATION
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Set Show Flags # 18191430653060657701
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

