buttons: 
- # ====== Button: SAVE ========================================
  id: 15664282150814366006
  identification: 
    button-name: SAVE
    label: Apply Changes

  layout: 
    sequence: 30
    region: Buttons # 1635674388416178974
    slot: NEXT
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
