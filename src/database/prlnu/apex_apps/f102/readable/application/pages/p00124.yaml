computations: 
- # ====== Computation: APPLICATION_TITLE ======================
  id: 2052282531693192114
  identification: 
    item-name: APPLICATION_TITLE

  execution: 
    sequence: 30
    point: Before Header

  computation: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      declare
          l_app_name varchar2(255);
      begin
          select nvl(preference_value,:APP_NAME)
            into l_app_name
            from eba_cust_preferences
           where preference_name = 'APPLICATION_TITLE';
          return l_app_name;
      exception
          when others then
              return :APP_NAME;
      end;

  server-side-condition: 
    type: Item is NULL
    item: APPLICATION_TITLE

