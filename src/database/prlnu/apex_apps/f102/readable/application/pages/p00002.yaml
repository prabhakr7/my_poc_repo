- # ====== Validation: Unique Account Number ===================
  id: 18482874033782185317
  identification: 
    name: Unique Account Number

  execution: 
    sequence: 30

  validation: 
    type: No Rows returned
    sql-query: |
      select null
      from eba_cust_customers
      where id <> :P2_ID
          and customer_account_number = :P2_CUSTOMER_ACCOUNT_NUMBER
    always-execute: false

  error: 
    error-message: '#LABEL# already associated with another customer.'
    display-location: Inline with Field and in Notification
    associated-item: P2_CUSTOMER_ACCOUNT_NUMBER # 18482874007814185316

- # ====== Validation: No Customer Cycles ======================
  id: 18482874112779185318
  identification: 
    name: No Customer Cycles

  execution: 
    sequence: 40

  validation: 
    type: No Rows returned
    sql-query: |
      select null
      from (  select c.id
              from eba_cust_customers c
              start with c.id = :P2_PARENT_CUSTOMER_ID
              connect by prior parent_customer_id = id
          ) x
      where x.id = :P2_ID
    always-execute: false

  error: 
    error-message: '#LABEL# cannot be circular'
    display-location: Inline with Field and in Notification
    associated-item: P2_PARENT_CUSTOMER_ID # 18482873839303185315

