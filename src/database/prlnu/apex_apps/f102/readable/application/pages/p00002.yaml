- # ====== Page Item: P2_REFERENCE_TYPES =======================
  id: 84473068682311193
  identification: 
    name: P2_REFERENCE_TYPES
    type: Checkbox Group

  label: 
    label: Reference Types
    alignment: Left

  settings: 
    number-of-columns: 1

  multiple-values: 
    type: Delimited List
    separator: ':'

  layout: 
    sequence: 480
    region: Customer Details # 17822771617162123935
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional
    template-options: 
    - '#DEFAULT#'

  validation: 
    value-required: false

  list-of-values: 
    type: Shared Component
    list-of-values: REFERENCE_TYPES # 15664327632360533036
    display-extra-values: false

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: SQL Query (return multiple values)
    sql-query: |
      select listagg(rt.id,':') within group (order by rt.reference_type) types
      from eba_cust_reference_types rt,
          eba_cust_customer_reftype_ref ref
      where rt.id = ref.reference_type_id
          and ref.customer_id = :P2_ID
    used: Only when current value in session state is null

  session-state: 
    storage: Per Session (Persistent)

  server-side-condition: 
    type: Item is NULL
    item: P2_ID

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    escape-special-characters: true
    restricted-characters: All characters can be saved.

  help: 
    help-text: In what ways would this customer be willing to be a reference?

  configuration: 
    build-option: Customer Referencability # 14310801550925186703

