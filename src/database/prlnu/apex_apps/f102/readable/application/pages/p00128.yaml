- # ====== Region: Failed Records ==============================
  id: 18157527169938684132
  identification: 
    name: Failed Records
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select n001 as row_num,
             c049 as action,
             c048 as error,
             c001, c002, c003,
             c004, c005, c006,
             c007, c008, c009,
             c010, c011, c012,
             c013, c014, c015,
             c016, c017, c018,
             c019, c020, c021,
             c022, c023, c024,
             c025, c026, c027,
             c028, c029, c030,
             c031, c032, c033,
             c034, c035, c036,
             c037, c038, c040,
             c041, c042, c043,
             c044, c045
        from apex_collections
       where collection_name = 'LOAD_CONTENT'
         and c047 in ('FAILED') 
       order by seq_id

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: Data Load Process Train # 18157524009666684129
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Collapsible
    template-options: 
    - '#DEFAULT#'
    - is-expanded
    - t-Region--noBorder
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    custom-attributes: 
    - 'style="width:100%;max-width:none;"'
    - null
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Item is NOT NULL and NOT zero
    item: P128_ERROR_COUNT

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    layout: 
      number-of-rows-type: Static Value
      number-of-rows: 15

    appearance: 
      template-type: Predefined
      template: HTML (standard)

    pagination: 
      type: Row Ranges 1-15 16-30 in select list (with pagination)
      display-position: Bottom - Right
      partial-page-refresh: false

    performance: 
      maximum-rows-to-process: 500

    messages: 
      when-no-data-found: no data found

    break-formatting: 
      break-columns: No Break

    advanced: 
      strip-html: true
      sort-nulls: Last

    heading: 
      type: PL/SQL Function Body
      pl/sql-function-body: |
        declare  
            l_string varchar(32667);
        begin
            l_string := wwv_flow_lang.system_message('DATA_LOAD.SEQUENCE_ACTION');
            l_string := l_string ||':'|| wwv_flow_lang.system_message('ERROR');
            for l_heading in ( select c005 as label
                                 from apex_collections
                                where collection_name = 'LOAD_COL_HEAD'
                                order by seq_id )
            loop
                l_string := l_string || ':' || apex_escape.html(l_heading.label);
            end loop;
            return l_string;
        end;

    download: 
      csv-export-enabled: false

    printing: 
      enabled: false

