- # ====== Page Item: P14_WELCOME_TEXT =========================
  id: 15090451029968917745
  identification: 
    name: P14_WELCOME_TEXT
    type: Textarea

  label: 
    label: Welcome Text, displayed on home page
    alignment: Left

  settings: 
    resizable: true
    auto-height: false
    character-counter: false
    trim-spaces: None

  layout: 
    sequence: 10
    region: Welcome Text # 15090450725158906070
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Required - Floating
    template-options: 
    - '#DEFAULT#'
    width: 80
    height: 4

  validation: 
    value-required: true
    maximum-length: 4000

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      declare
         c integer := 0;
         t varchar2(4000) := null;
      begin
      select count(*) into c from eba_cust_preferences where preference_name = 'WELCOME_TEXT';
      if c = 0 then 
          return null;
      else
          t := EBA_CUST_FW.get_preference_value ('WELCOME_TEXT');
          if t = '&'||'nbsp;' then 
             return null;
          else 
             return t;
          end if;
      end if;
      exception when others then return null;
      end;
    used: Always, replacing any existing value in session state

  session-state: 
    data-type: VARCHAR2
    storage: Per Session (Persistent)

  quick-picks: 
    show-quick-picks: false

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

