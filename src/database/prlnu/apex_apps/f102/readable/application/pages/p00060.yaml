dynamic-actions: 
- # ====== Dynamic Action: Import From Copy and Paste ==========
  id: 15910207027893915877
  identification: 
    name: Import From Copy and Paste

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P60_IMPORT_FROM

  client-side-condition: 
    type: Item = Value
    item: P60_IMPORT_FROM
    value: PASTE

  actions: 
  - # ====== Action: Show ========================================
    id: 15910207338403915878
    identification: 
      action: Show

    settings: 
      show-all-on-the-same-line: true

    affected-elements: 
      selection-type: Item(s)
      item(s): 
