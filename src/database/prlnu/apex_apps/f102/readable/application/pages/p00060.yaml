- # ====== Page Item: P60_GROUP_SEPARATOR ======================
  id: 15910206148840915877
  identification: 
    name: P60_GROUP_SEPARATOR
    type: Text Field

  label: 
    label: Group Separator
    alignment: Left

  settings: 
    subtype: Text
    trim-spaces: None
