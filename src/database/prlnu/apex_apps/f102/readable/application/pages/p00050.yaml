- # ====== Region: Usage Metrics - 90 days =====================
  id: 14955992546054133919
  identification: 
    name: Usage Metrics - 90 days
    type: Badge List

  source: 
    sql-query: |
      select
          count(*) c,
          'Views' l,
          1 disp
      from
          eba_cust_clicks
      where
          cust_id = :P50_ID 
      and
          view_timestamp > sysdate - 90
      UNION
      select
          count(distinct app_username)  c,
          'Users' l,
          2 disp
      from
          eba_cust_clicks
      where
          cust_id = :P50_ID 
      and
          view_timestamp > sysdate - 90
      order by disp    

