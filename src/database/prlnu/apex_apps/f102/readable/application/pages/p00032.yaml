    legend: 
      show: false

    series: 
    - # ====== Series: Category ====================================
      id: 1128434220857218954
      identification: 
        name: Category

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select id, category, cnt, category || ' ('|| cnt || ')' tooltip
          from (select  
             b.id,
             b.category,
             count(*) cnt
          from   
             eba_cust_customers a , 
             eba_cust_categories b
          where 
             a.category_id = b.id and
             (NVL(:P32_CATEGORY,0) = 0 or a.CATEGORY_ID = :P32_CATEGORY) and
             (NVL(:P32_GEO,0) = 0 or :P32_GEO = a.geography_id)
          group by b.id, b.category
          order by 2)
        page-items-to-submit: 
        - P32_CATEGORY
        - P32_GEO

      order-by: 
        type: None

      column-mapping: 
        label: CATEGORY
        value: CNT
        custom-tooltip: TOOLTIP

      appearance: 
        assigned-to-y2-axis: false

      link: 
        type: Redirect to Page in this Application
        target: 
          url: 'f?p=&APP_ID.:59:&SESSION.::&DEBUG.:RP,RIR:IR_CATEGORY,P59_CATEGORY:&CATEGORY.,&ID.'
          page: 59 # Customers
          clear-cache: RP,RIR
          values: 
            ir_category: '&CATEGORY.'
            p59_category: '&ID.'

      label: 
        show: false

    axes: 
    - # ====== Axis: x =============================================
      id: 1128434397687218955
