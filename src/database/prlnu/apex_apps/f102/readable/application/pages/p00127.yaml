- # ====== Region: Error =======================================
  id: 18158138000524790233
  identification: 
    name: Error
    type: Static Content

  source: 
    html-code: |
      <section class="uRegion uWhiteRegion uMessageRegion load-warning clearfix" id="load-warning" style="position: static">
        <div class="uRegionContent clearfix">
          <img src="#IMAGE_PREFIX#f_spacer.gif" class="uWarningIcon" alt="" />
          <div class="uMessageText">
            No data was provided that can be successfully loaded or updated.
          </div>
        </div>
      </section>

  layout: 
    sequence: 10
    parent-region: Data Load Process Train # 18157501469846684090
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes
    template-options: 
    - '#DEFAULT#'
    css-classes: 
    - infoTextRegion
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: No Rows returned
    sql-query: |
      select 1 x 
      from apex_collections
       where collection_name = 'LOAD_CONTENT'
         and c049 in ('INSERT','UPDATE')

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    settings: 
      output-as: HTML
      expand-shortcuts: false

