- # ====== Upgrade Script: Feedback Types Data =================
  id: 18753115138515324080
  identification: 
    name: Feedback Types Data

  execution: 
    sequence: 370

  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      declare
          l_table_cnt number;
          l_row_cnt   number;
      begin
          select count(*)
            into l_table_cnt
            from user_tables
           where table_name = 'EBA_CUST_FEEDBACK_TYPES';
          if l_table_cnt = 1 then
              select count(*)
                into l_row_cnt
                from eba_cust_feedback_types;
              if l_row_cnt = 0 then
                  return true;
              end if;
          end if;
          return false;
      end;

