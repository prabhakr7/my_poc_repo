- # ====== Upgrade Script: populate eba_cust_acl_features ======
  id: 1383044232297568559
  identification: 
    name: populate eba_cust_acl_features

  execution: 
    sequence: 450

  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      declare
          l_cnt    pls_integer;
          l_retval boolean := true;
      begin
          select count(*)
            into l_cnt
            from eba_cust_acl_features
           where authorization_name in ('EDIT_COMPETITORS', 'VIEW_COMPETITORS');
      
          if l_cnt > 0 then
              l_retval := false;
          end if;
      
          return l_retval;
      end;

