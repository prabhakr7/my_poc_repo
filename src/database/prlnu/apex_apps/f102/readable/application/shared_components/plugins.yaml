      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: VALUE

    help: 
      help-text: <p>Select whether to display  the item value or the percentage as the right most text in the chart.</p>

    entries: 
    - # ====== Entry: Value ========================================
      id: 345717084841156677
      entry: 
        sequence: 10
        display: Value
        return: VALUE

      advanced: 
        quick-pick: false

    - # ====== Entry: Percentage ===================================
      id: 345717558476156678
      entry: 
        sequence: 20
        display: Percentage
        return: BAR_WIDTH

      advanced: 
        quick-pick: false

  - # ====== Custom Attribute: Value Prefix ======================
    id: 345718071649156678
    identification: 
      static-id: attribute_12
      attribute: 12
      name: Value Prefix
      scope: Component

    layout: 
      sequence: 60

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: false
      translatable: true

    condition: 
      depending-on-custom-attribute: Value Display # 345716724487156677
      depending-on-condition-type: in list
      expression: VALUE
      always-evaluate: true

    help: 
      help-text: <p>Enter the text that prefixes the value.<p>

  - # ====== Custom Attribute: Value Suffix ======================
    id: 345718453813156678
    identification: 
      static-id: attribute_13
      attribute: 13
      name: Value Suffix
      scope: Component

    layout: 
      sequence: 70

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: false
      translatable: true

    condition: 
      depending-on-custom-attribute: Value Display # 345716724487156677
      depending-on-condition-type: in list
      expression: VALUE
      always-evaluate: true

    help: 
      help-text: Enter the text that is appended to the value.

  - # ====== Custom Attribute: Maximum Rows ======================
    id: 345718844925156678
    identification: 
      static-id: attribute_14
      attribute: 14
      name: Maximum Rows
      scope: Component

    layout: 
      sequence: 180

    settings: 
      type: Integer
      common: true
      show-in-wizard: true
      required: true
