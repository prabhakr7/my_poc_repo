    default: 
      value: 5

    help: 
      help-text: |
        <p>Enter the maximum number of items to be displayed inside the region.</p>
        <p>Note: Bar width calculations are based on the number of items displayed.</p>

  - # ====== Custom Attribute: Display Type ======================
    id: 345719257042156679
    identification: 
      static-id: attribute_15
      attribute: 15
      name: Display Type
      scope: Component

    layout: 
      sequence: 90

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: TEXT

    help: 
      help-text: <p>Select how to display the chart information.</p>

    entries: 
    - # ====== Entry: Icon Chart ===================================
      id: 345719689852156679
      entry: 
        sequence: 10
        display: Icon Chart
        return: ICON

      advanced: 
        quick-pick: false

      help: 
        help-text: Displays bars with the label and value above and add an icon on the left.

    - # ====== Entry: Text Chart ===================================
      id: 345720181801156679
      entry: 
        sequence: 20
        display: Text Chart
        return: TEXT

      advanced: 
        quick-pick: false

      help: 
        help-text: Displays bars with the label and value either above or inline with the bar.

  - # ====== Custom Attribute: Bar Width Calculation =============
    id: 345720713157156679
    identification: 
      static-id: attribute_16
      attribute: 16
      name: Bar Width Calculation
      scope: Component

    layout: 
      sequence: 80

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: ABSOLUTE

    help: 
      help-text: <p>Select how to calculate the width of the bars in the chart.</p>

    entries: 
    - # ====== Entry: Absolute =====================================
      id: 345721047037156680
      entry: 
        sequence: 10
        display: Absolute
        return: ABSOLUTE

      advanced: 
        quick-pick: false

      help: 
        help-text: 100% bar width is represented by the maximum value displayed.

    - # ====== Entry: Relative =====================================
      id: 345721625324156680
      entry: 
        sequence: 20
